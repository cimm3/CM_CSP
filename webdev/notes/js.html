            function changecolor(){
                document.getElementById("change").style.color = "orange"
            }
            function show(){
                if(document.getElementById("image").style.display == 'block'){
                    document.getElementById("image").style.display = 'none'
                    document.getElementById("image").style.display = 'SHow Image'
                }else{
                    document.getElementById("image").style.display = 'block'
                }
                document.getElementById("image").style.display = 'block'
                document.getElementById("image").style.display = 'hide image'
            }
            function hover(){
                document.getElementById("button").style.backgroundColor="blue"
                document.getElementById("button").style.Color="white"
            }
            function leave(id){

                document.getElementById("button").style.Color="balck"
            }
            function popup(){
                alert("You should be taking notes")
            }
            // onclick onmousedown onmouseeneter- onmouseover onmouseleave-onmouseout
        
        </script>
    
    </head>
